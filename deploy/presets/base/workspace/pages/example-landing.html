<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example Landing Page</title>
  <link rel="stylesheet" href="example-landing.css">
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <a href="/" class="logo">Store Name</a>
      <div class="nav-links">
        <a href="/products">Products</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </div>
    </nav>
    <div class="hero-content">
      <h1>Welcome to Our Store</h1>
      <p>Discover amazing products crafted with care.</p>
      <a href="/products" class="cta-button">Shop Now</a>
    </div>
  </header>

  <section class="features">
    <div class="feature">
      <h3>Free Shipping</h3>
      <p>On all orders over $50</p>
    </div>
    <div class="feature">
      <h3>Easy Returns</h3>
      <p>30-day return policy</p>
    </div>
    <div class="feature">
      <h3>Secure Payment</h3>
      <p>100% secure checkout</p>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Store Name. All rights reserved.</p>
  </footer>
</body>
</html>
